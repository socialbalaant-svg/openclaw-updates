<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تحديثات OpenClaw - كل الإصدارات</title>
<meta name="description" content="قائمة بكل تحديثات OpenClaw الجديدة مع روابط للتقارير التفصيلية.">
<style>
  :root{--bg:#0b1020;--card:#121a33;--ink:#e8ecf8;--muted:#a4adcb;--accent:#7c5cff;--accent-2:#22d3ee;--ok:#22c55e;--border:rgba(255,255,255,.08)}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:"Tajawal","Cairo","Segoe UI",system-ui,sans-serif;line-height:1.7}
  a{color:var(--accent-2);text-decoration:none}
  a:hover{text-decoration:underline}
  .wrap{max-width:860px;margin:0 auto;padding:32px 20px 64px}
  .hero{background:linear-gradient(135deg,rgba(124,92,255,.18),rgba(34,211,238,.12));border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:24px}
  h1{font-size:30px;margin:0 0 8px}
  p{color:#d3d8eb;margin:0}
  .list{list-style:none;padding:0;margin:0}
  .item{display:flex;align-items:center;justify-content:space-between;gap:14px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 20px;margin-bottom:12px;flex-wrap:wrap}
  .item .left{display:flex;flex-direction:column;gap:4px}
  .item .ver{font-size:18px;font-weight:700;color:#fff}
  .item .date{color:var(--muted);font-size:13px}
  .item .tag{background:rgba(34,197,94,.14);color:#86efac;border:1px solid rgba(34,197,94,.35);padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600;width:fit-content}
  .item .tag.old{background:rgba(255,255,255,.04);color:var(--muted);border-color:var(--border)}
  .item .right a{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;padding:8px 14px;border-radius:10px;font-weight:600;font-size:14px}
  .footer{text-align:center;color:var(--muted);font-size:13px;margin-top:24px}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <h1>🦾 تحديثات OpenClaw</h1>
    <p>كل إصدارات OpenClaw الجديدة مع روابط للتقارير التفصيلية وتعليمات التحديث.</p>
  </section>

  <ul class="list">
    <li class="item">
      <div class="left">
        <span class="tag">جديد</span>
        <span class="ver">OpenClaw 2026.6.10</span>
        <span class="date">📅 24 يونيو 2026 — وضع السرعة التلقائي + تحسينات</span>
      </div>
      <div class="right"><a href="update-2026.6.10.html">عرض التقرير</a></div>
    </li>
  </ul>

  <p class="footer">تم التحديث تلقائياً بواسطة Claw 🦾</p>
</div>
</body>
</html>
